name: Tests

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  go-tests:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/app/package-lock.json

      # The Go server embeds server/app/dist via //go:embed in routes.go,
      # so the SPA must be built before `go test ./...` will compile.
      - name: Build SPA (so go:embed succeeds)
        working-directory: server/app
        run: |
          npm ci
          npm run build

      - name: Run unit tests with race detector and coverage
        run: go test -race -cover -coverprofile=coverage.out ./...

      - name: Show coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Run integration tests
        run: go test -race -tags=integration ./...

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/app/package-lock.json

      - name: Install
        working-directory: server/app
        run: npm ci

      - name: Test
        working-directory: server/app
        run: npm run test:ci
